# ===========================================
# Kubernetes Secrets - Sensitive Configuration
# ===========================================
# IMPORTANT: Replace placeholder values with actual secrets in production
# Use: kubectl create secret generic nikzdevz-secrets --from-literal=key=value
# Or use external secrets management (Vault, AWS Secrets Manager, etc.)
apiVersion: v1
kind: Secret
metadata:
  name: nikzdevz-secrets
  namespace: nikzdevz
  labels:
    app: nikzdevz
    component: secrets
type: Opaque
stringData:
  # Database Credentials (REPLACE PLACEHOLDERS)
  MYSQL_ROOT_PASSWORD: "REPLACE_WITH_STRONG_ROOT_PASSWORD"
  MYSQL_USER: "nikzdevz_user"
  MYSQL_PASSWORD: "REPLACE_WITH_STRONG_DB_PASSWORD"

  # Email Credentials (REPLACE PLACEHOLDERS)
  MAIL_USERNAME: "your_email@gmail.com"
  MAIL_PASSWORD: "REPLACE_WITH_APP_PASSWORD"
  RECIPIENT_EMAIL: "recipient@example.com"

  # API Keys (REPLACE PLACEHOLDERS)
  GEMINI_API_KEY: "REPLACE_WITH_GEMINI_API_KEY"
---