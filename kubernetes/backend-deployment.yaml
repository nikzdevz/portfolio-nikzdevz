# ===========================================
# Kubernetes Deployment - Backend Flask API
# ===========================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: nikzdevz
  labels:
    app: nikzdevz
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nikzdevz
      component: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nikzdevz
        component: backend
    spec:
      containers:
        - name: backend
          image: nikzdevz-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: nikzdevz-config
            - secretRef:
                name: nikzdevz-secrets
          env:
            - name: MYSQL_HOST
              value: "mysql-service"
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: nikzdevz-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nikzdevz-secrets
                  key: MYSQL_PASSWORD
            - name: MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nikzdevz-secrets
                  key: MAIL_USERNAME
            - name: MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nikzdevz-secrets
                  key: MAIL_PASSWORD
            - name: RECIPIENT_EMAIL
              valueFrom:
                secretKeyRef:
                  name: nikzdevz-secrets
                  key: RECIPIENT_EMAIL
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: nikzdevz-secrets
                  key: GEMINI_API_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts: []
      volumes: []
      restartPolicy: Always
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: component
                      operator: In
                      values:
                        - backend
                topologyKey: kubernetes.io/hostname
---