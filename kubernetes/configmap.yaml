# ===========================================
# Kubernetes ConfigMap - Application Configuration
# ===========================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: nikzdevz-config
  namespace: nikzdevz
  labels:
    app: nikzdevz
    component: config
data:
  # Server Configuration
  BACKEND_PORT: "5000"
  FLASK_ENV: "production"
  FRONTEND_PORT: "3000"

  # Database Configuration
  MYSQL_HOST: "mysql-service"
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: "nikzdevz_portfolio"

  # Email Configuration
  MAIL_SERVER: "smtp.gmail.com"
  MAIL_PORT: "587"
  MAIL_USE_TLS: "True"

  # Frontend Configuration
  VITE_API_URL: "http://backend-service:5000"
---