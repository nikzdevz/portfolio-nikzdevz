# ===========================================
# Kubernetes Service - Backend Flask API
# ===========================================
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: nikzdevz
  labels:
    app: nikzdevz
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
  selector:
    app: nikzdevz
    component: backend
---