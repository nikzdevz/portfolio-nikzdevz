
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nikzdevz | Premium Full-Stack & DevOps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Plus Jakarta Sans', 'sans-serif'],
              display: ['Space Grotesk', 'sans-serif'],
            },
            colors: {
              midnight: '#05070A',
              'brand-purple': '#9D50BB',
              'brand-teal': '#00F2FE',
              'brand-pink': '#FF0080',
              'surface': '#0A0F1A',
            },
            borderRadius: {
              '4xl': '2.5rem',
              '5xl': '4rem',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --brand-1: #9D50BB;
        --brand-2: #00F2FE;
        --brand-3: #FF0080;
        --noise-opacity: 0.05;
      }
      
      body {
        background-color: #05070A;
        color: #F8FAFC;
        overflow-x: hidden;
      }

      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      }

      .glass-shine {
        position: relative;
        overflow: hidden;
      }
      .glass-shine::before {
        content: "";
        position: absolute;
        top: -100%;
        left: -100%;
        width: 300%;
        height: 300%;
        background: linear-gradient(
          45deg,
          transparent 0%,
          rgba(255, 255, 255, 0.03) 45%,
          rgba(255, 255, 255, 0.07) 50%,
          rgba(255, 255, 255, 0.03) 55%,
          transparent 100%
        );
        transition: all 0.6s ease;
        pointer-events: none;
      }
      .glass-shine:hover::before {
        top: -50%;
        left: -50%;
      }

      .text-glow {
        text-shadow: 0 0 30px rgba(157, 80, 187, 0.4);
      }

      .neon-border {
        position: relative;
      }
      .neon-border::after {
        content: "";
        position: absolute;
        inset: -1px;
        background: linear-gradient(45deg, var(--brand-1), var(--brand-2), var(--brand-3));
        border-radius: inherit;
        z-index: -1;
        opacity: 0.2;
      }

      .noise-bg::before {
        content: "";
        position: fixed;
        inset: 0;
        opacity: var(--noise-opacity);
        z-index: 9999;
        pointer-events: none;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .animate-marquee {
        animation: marquee 30s linear infinite;
      }

      .perspective-1000 {
        perspective: 1000px;
      }
    </style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.11.0",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="dark noise-bg font-sans antialiased">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
