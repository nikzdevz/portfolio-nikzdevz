# ===========================================
# nikzdevz Portfolio - Docker Compose
# ===========================================
# Production-grade multi-service orchestration

services:
  # ===========================================
  # Database Service (MySQL 8.0)
  # ===========================================
  db:
    image: mysql:8.0
    container_name: nikzdevz-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${MYSQL_PORT}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - nikzdevz-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    security_opt:
      - no-new-privileges:true

  # ===========================================
  # Backend Service (Flask API)
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nikzdevz-backend
    restart: unless-stopped
    environment:
      # Server config
      BACKEND_PORT: ${BACKEND_PORT}
      FLASK_ENV: ${FLASK_ENV}
      # Database
      MYSQL_HOST: db
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      # Email
      MAIL_SERVER: ${MAIL_SERVER}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USE_TLS: ${MAIL_USE_TLS}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      RECIPIENT_EMAIL: ${RECIPIENT_EMAIL}
    ports:
      - "${BACKEND_PORT}:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - nikzdevz-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true

  # ===========================================
  # Frontend Service (React + Nginx)
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://backend:${BACKEND_PORT}
        - GEMINI_API_KEY=${GEMINI_API_KEY}
    container_name: nikzdevz-frontend
    restart: unless-stopped
    environment:
      # Build-time args converted to env
      VITE_API_URL: http://backend:${BACKEND_PORT}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "${FRONTEND_PORT}:3000"
    depends_on:
      - backend
    networks:
      - nikzdevz-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    security_opt:
      - no-new-privileges:true

# ===========================================
# Volumes
# ===========================================
volumes:
  mysql_data:
    driver: local

# ===========================================
# Networks
# ===========================================
networks:
  nikzdevz-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16